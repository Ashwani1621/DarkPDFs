server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The HTML must always revalidate so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The PDF.js worker is an ES module; some nginx mime tables lack .mjs.
    location ~* \.mjs$ {
        types {}
        default_type text/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Vite content-hashes every asset filename, so they can be cached forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
